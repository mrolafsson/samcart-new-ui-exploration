<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SamCart — Full Prototype</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&amp;display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', -apple-system, sans-serif; }
    button { font-family: inherit; cursor: pointer; }
    input, textarea { font-family: inherit; }
    ::-webkit-scrollbar { height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .track { display: flex; gap: 20px; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
    .el { transition: opacity 0.6s ease, transform 0.6s ease; }
    .shimmer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%); background-size: 200% 100%; animation: shimmer 2.5s infinite; pointer-events: none; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

// ════════════════════════════════════════════
// DASHBOARD COMPONENT
// ════════════════════════════════════════════
// ════════════════════════════════════════════
// SAMCART — Section Landing Pages Mockup
// ════════════════════════════════════════════

const Dashboard = ({ onNewBusiness }) => {
  const [currentPage, setCurrentPage] = useState("home");
  const [expandedProduct, setExpandedProduct] = useState("playbook");
  const [productView, setProductView] = useState("performance");
  const [growthTab, setGrowthTab] = useState("overview");
  const [salesTab, setSalesTab] = useState("overview");
  const [pagesTab, setPagesTab] = useState("overview");

  // ─── Colors ───
  const c = {
    bg: "#F5F6F8", card: "#FFFFFF", text: "#171A1F", sub: "#5F6B7A", muted: "#9BA4B0",
    border: "#E2E5EA", blue: "#2563EB", blueLight: "#EEF4FF", blueBorder: "#BDD4FE",
    green: "#0D9668", greenLight: "#EDFCF5", greenBorder: "#A3F0CD",
    amber: "#CF8A06", amberLight: "#FFF9E6", amberBorder: "#F5D880",
    purple: "#7534ED", purpleLight: "#F3EFFE", purpleBorder: "#CFBCFE",
    rose: "#DC2452", roseLight: "#FFF0F3", roseBorder: "#FDBED0",
    slate: "#374151",
  };

  // ─── Shared Components ───
  const Pill = ({ bg, color, border, children, dot }) => (
    <span style={{ display: "inline-flex", alignItems: "center", padding: "2px 9px", borderRadius: 100, fontSize: 10, fontWeight: 700, background: bg, color, border: `1px solid ${border}`, letterSpacing: "0.02em", whiteSpace: "nowrap", lineHeight: "18px" }}>
      {dot && <span style={{ width: 5, height: 5, borderRadius: "50%", background: color, marginRight: 5 }} />}{children}
    </span>
  );

  const Btn = ({ children, color = c.blue, bg = c.blueLight, border = c.blueBorder, strong, small, onClick }) => (
    <button onClick={onClick} style={{
      background: strong ? color : bg, color: strong ? "#fff" : color,
      border: strong ? "none" : `1px solid ${border}`, borderRadius: strong ? 8 : 6,
      padding: strong ? "8px 16px" : small ? "3px 8px" : "4px 11px",
      fontSize: small ? 10 : strong ? 13 : 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap",
    }}>{children}</button>
  );

  const Card = ({ children, style: s }) => (
    <div style={{ background: c.card, borderRadius: 12, border: `1px solid ${c.border}`, ...s }}>{children}</div>
  );

  const SLabel = ({ children }) => (
    <div style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: c.muted, marginBottom: 6 }}>{children}</div>
  );

  const Metric = ({ label, value, sub: s, change, color, large }) => (
    <div>
      <div style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", color: c.muted, marginBottom: 4 }}>{label}</div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
        <span style={{ fontSize: large ? 30 : 22, fontWeight: 700, color: color || c.text, letterSpacing: "-0.02em" }}>{value}</span>
        {change && <span style={{ fontSize: 12, fontWeight: 600, color: change.startsWith("+") ? c.green : change.startsWith("-") ? c.rose : c.muted }}>{change}</span>}
      </div>
      {s && <div style={{ fontSize: 12, color: c.muted, marginTop: 2 }}>{s}</div>}
    </div>
  );

  const TabBar = ({ tabs, active, onChange }) => (
    <div style={{ display: "flex", gap: 2, background: c.bg, borderRadius: 8, padding: 3, marginBottom: 16, width: "fit-content" }}>
      {tabs.map(t => (
        <button key={t.key} onClick={() => onChange(t.key)} style={{
          padding: "6px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer",
          background: active === t.key ? c.card : "transparent", color: active === t.key ? c.text : c.sub,
          border: active === t.key ? `1px solid ${c.border}` : "1px solid transparent",
          boxShadow: active === t.key ? "0 1px 2px rgba(0,0,0,0.04)" : "none",
        }}>{t.label}</button>
      ))}
    </div>
  );

  const ProgressBar = ({ value, max, color = c.blue }) => (
    <div style={{ height: 6, background: c.bg, borderRadius: 3, overflow: "hidden", flex: 1 }}>
      <div style={{ height: "100%", width: `${Math.min(100, (value / max) * 100)}%`, background: color, borderRadius: 3, transition: "width 0.3s" }} />
    </div>
  );

  const MiniSparkline = ({ data, color = c.blue, width = 80, height = 24 }) => {
    const max = Math.max(...data);
    const min = Math.min(...data);
    const range = max - min || 1;
    const points = data.map((v, i) => `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * height}`).join(" ");
    return (
      <svg width={width} height={height} style={{ display: "block" }}>
        <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" />
      </svg>
    );
  };

  const [activeBiz, setActiveBiz] = useState(0);

  const businesses = [
    { name: "Creator Academy", icon: "C", color: c.purple },
    { name: "Fitness Empire", icon: "F", color: "#0D9668" },
    { name: "SaaS Toolkit", icon: "S", color: c.blue },
  ];

  // ─── Nav ───
  const navItems = [
    { key: "home", label: "Home", icon: "⌂" },
    { key: "products", label: "Products", icon: "◎" },
    { key: "pages", label: "Pages", icon: "⊞" },
    { key: "growth", label: "Growth", icon: "⋔" },
    { key: "sales", label: "Sales", icon: "◉" },
    { key: "apps", label: "Apps", icon: "⊞" },
  ];

  // Sub-navigation items per section
  const subNavItems = {
    home: [],
    products: [{ key: "performance", label: "Performance" }, { key: "catalog", label: "Catalog" }, { key: "deals", label: "Deals" }],
    pages: [{ key: "overview", label: "Performance" }, { key: "all", label: "All Pages" }, { key: "domains", label: "Domains" }],
    growth: [{ key: "overview", label: "Overview" }, { key: "email", label: "Email" }, { key: "social", label: "Social Media" }, { key: "affiliates", label: "Affiliates" }, { key: "recovery", label: "Cart Recovery" }, { key: "experiments", label: "Experiments" }],
    sales: [{ key: "overview", label: "Analytics" }, { key: "orders", label: "Orders" }, { key: "customers", label: "Customers" }, { key: "payments", label: "Payments" }],
    apps: [],
  };

  const getSubTab = () => {
    if (currentPage === "products") return productView;
    if (currentPage === "pages") return pagesTab;
    if (currentPage === "growth") return growthTab;
    if (currentPage === "sales") return salesTab;
    return null;
  };
  const setSubTab = (v) => {
    if (currentPage === "products") setProductView(v);
    if (currentPage === "pages") setPagesTab(v);
    if (currentPage === "growth") setGrowthTab(v);
    if (currentPage === "sales") setSalesTab(v);
  };

  const Nav = () => (
    <div style={{ position: "sticky", top: 0, zIndex: 10, background: "#fff" }}>
      {/* Business tabs — compact */}
      <div style={{ padding: "0 24px", display: "flex", alignItems: "end", height: 34, gap: 0, borderBottom: `1px solid ${c.border}`, background: c.bg }}>
        {businesses.map((b, i) => (
          <div key={i} onClick={() => setActiveBiz(i)} style={{
            display: "flex", alignItems: "center", gap: 5, padding: "5px 14px",
            borderRadius: "6px 6px 0 0", cursor: "pointer", marginBottom: -1,
            background: i === activeBiz ? c.card : "#ECEEF1",
            border: i === activeBiz ? `1px solid ${c.border}` : "1px solid transparent",
            borderBottom: i === activeBiz ? `1px solid ${c.card}` : "1px solid transparent",
            transition: "all 0.15s",
          }}
          onMouseEnter={e => { if (i !== activeBiz) e.currentTarget.style.background = "#E4E6EA"; }}
          onMouseLeave={e => { if (i !== activeBiz) e.currentTarget.style.background = "#ECEEF1"; }}>
            <div style={{ width: 14, height: 14, borderRadius: 3, background: b.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 7, fontWeight: 800, flexShrink: 0 }}>{b.icon}</div>
            <span style={{ fontSize: 11, fontWeight: i === activeBiz ? 700 : 500, color: i === activeBiz ? c.text : c.sub, whiteSpace: "nowrap" }}>{b.name}</span>
          </div>
        ))}
        <button style={{
          display: "flex", alignItems: "center", gap: 3, padding: "0 8px",
          border: `1px dashed ${c.purpleBorder}`, borderRadius: 4, background: "transparent",
          cursor: "pointer", marginLeft: 6, marginBottom: 5, height: 18,
        }}
        onMouseEnter={e => e.currentTarget.style.background = c.purpleLight}
        onMouseLeave={e => e.currentTarget.style.background = "transparent"}
        onClick={onNewBusiness}>
          <span style={{ fontSize: 11, fontWeight: 700, color: c.purple, lineHeight: 1 }}>+</span>
          <span style={{ fontSize: 9, fontWeight: 600, color: c.purple }}>New</span>
        </button>
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 10, paddingBottom: 5 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 5, padding: "3px 10px", background: c.bg, borderRadius: 6, border: `1px solid ${c.border}` }}>
            <span style={{ fontSize: 11, color: c.muted }}>⌕</span>
            <input placeholder="Search..." style={{ border: "none", background: "transparent", fontSize: 11, outline: "none", color: c.text, width: 120 }} />
          </div>
          <div style={{ width: 22, height: 22, borderRadius: "50%", background: c.blueLight, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 800, color: c.blue, cursor: "pointer" }}>JD</div>
        </div>
      </div>

      {/* Section navigation — with icons */}
      <div style={{ padding: "0 24px", display: "flex", alignItems: "center", height: 40, gap: 2, borderBottom: `1px solid ${c.border}` }}>
        {navItems.map(n => (
          <div key={n.key} onClick={() => setCurrentPage(n.key)} style={{
            display: "flex", alignItems: "center", gap: 5, padding: "5px 12px", borderRadius: 6, cursor: "pointer",
            background: currentPage === n.key ? c.blueLight : "transparent",
            color: currentPage === n.key ? c.blue : c.sub,
            fontWeight: currentPage === n.key ? 700 : 500, fontSize: 13,
            transition: "all 0.12s",
          }}
          onMouseEnter={e => { if (currentPage !== n.key) e.currentTarget.style.background = "#F8F9FA"; }}
          onMouseLeave={e => { if (currentPage !== n.key) e.currentTarget.style.background = "transparent"; }}>
            <span style={{ fontSize: 13, opacity: currentPage === n.key ? 1 : 0.5 }}>{n.icon}</span>
            {n.label}
          </div>
        ))}
      </div>
    </div>
  );

  // Sidebar for sub-navigation
  const Sidebar = () => {
    const items = subNavItems[currentPage] || [];
    const active = getSubTab();
    const sectionLabels = { products: "PRODUCTS", pages: "PAGES", growth: "GROWTH", sales: "SALES" };
    return (
      <div style={{ width: 180, flexShrink: 0, paddingTop: 8 }}>
        {items.length > 0 && (
          <>
            <div style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: c.muted, padding: "8px 16px 8px", marginBottom: 2 }}>{sectionLabels[currentPage]}</div>
            {items.map(item => (
              <div key={item.key} onClick={() => setSubTab(item.key)} style={{
                padding: "8px 16px", fontSize: 13, fontWeight: active === item.key ? 600 : 400,
                color: active === item.key ? c.blue : c.sub, cursor: "pointer",
                background: active === item.key ? c.blueLight : "transparent",
                borderRadius: 6, margin: "1px 8px", transition: "all 0.1s",
              }}
              onMouseEnter={e => { if (active !== item.key) e.currentTarget.style.background = c.bg; }}
              onMouseLeave={e => { if (active !== item.key) e.currentTarget.style.background = "transparent"; }}>
                {item.label}
              </div>
            ))}
          </>
        )}
      </div>
    );
  };

  // ════════════════════════════════════════════
  //  HOME DASHBOARD
  // ════════════════════════════════════════════
  const HomePage = () => {
    const AI = () => <span style={{ fontSize: 11, marginRight: 2 }}>✦</span>;
    const AiBtn = ({ children, color = c.blue, bg = c.blueLight, border = c.blueBorder, small, strong }) => (
      <button style={{
        background: strong ? `linear-gradient(135deg, ${color}, ${color}dd)` : bg,
        color: strong ? "#fff" : color,
        border: strong ? "none" : `1px solid ${border}`, borderRadius: strong ? 8 : 6,
        padding: strong ? "8px 16px" : small ? "3px 8px" : "4px 11px",
        fontSize: small ? 10 : strong ? 13 : 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap",
        display: "inline-flex", alignItems: "center", gap: 3,
      }}><AI />{children}</button>
    );

    return (
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div>
            <h1 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 2px", letterSpacing: "-0.02em" }}>Your Business</h1>
            <p style={{ margin: 0, color: c.sub, fontSize: 13 }}>Last 30 days · 6 live products</p>
          </div>
          <AiBtn strong color={c.purple}>Generate Product</AiBtn>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 16 }}>
          {[
            { l: "Revenue", v: "$5,367", ch: "+23%", sp: [12, 18, 15, 22, 28, 31, 27] },
            { l: "Orders", v: "133", ch: "+12%", sp: [5, 8, 6, 9, 12, 14, 11] },
            { l: "Leads", v: "290", ch: "+31%", sp: [15, 22, 18, 28, 35, 42, 38] },
            { l: "Avg Order Value", v: "$40.35", ch: "+8%", sp: [35, 37, 36, 39, 41, 42, 40] },
          ].map((s, i) => (
            <Card key={i} style={{ padding: "16px 18px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start" }}>
                <Metric label={s.l} value={s.v} change={s.ch} />
                <MiniSparkline data={s.sp} color={c.green} />
              </div>
            </Card>
          ))}
        </div>

        {/* Single attention alert — only things requiring action */}
        <Card style={{ padding: "14px 18px", marginBottom: 16, borderLeft: `3px solid ${c.purple}` }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 16 }}>🧪</span>
              <span style={{ fontSize: 13 }}><strong>$39 vs $49 experiment</strong> on Creator Playbook is at 78% confidence · 4 days left</span>
            </div>
            <Btn small color={c.purple} bg={c.purpleLight} border={c.purpleBorder}>View Experiment</Btn>
          </div>
        </Card>

        <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", color: c.sub, marginBottom: 8 }}>Your Products</div>

        {/* Product grid */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
          {[
            { name: "Creator Playbook", price: "$39", rev: "$2,847", sales: 73, type: "Ebook", conv: "13.5%", trend: [18, 22, 19, 28, 31, 27, 33], hasUpsell: true, hasBump: true, exp: 1 },
            { name: "Creator Masterclass", price: "$79", rev: "$1,580", sales: 20, type: "Ebook", conv: "7.0%", trend: [8, 6, 9, 5, 7, 8, 6], hasUpsell: false, hasBump: false, exp: 0, warn: true },
            { name: "Social Media Templates", price: "$29", rev: "$522", sales: 18, type: "Download", conv: "11.5%", trend: [4, 6, 5, 8, 7, 9, 8], hasUpsell: false, hasBump: false, exp: 0 },
            { name: "Creator Starter Kit", price: "$19", rev: "$418", sales: 22, type: "Download", conv: "11.1%", trend: [6, 5, 7, 8, 6, 9, 8], hasUpsell: false, hasBump: false, exp: 0 },
            { name: "Free Creator Guide", price: "Free", rev: "203 leads", sales: null, type: "Lead Magnet", conv: "24.0%", trend: [18, 25, 22, 30, 35, 42, 38], free: true },
            { name: "Launch Checklist", price: "Free", rev: "87 leads", sales: null, type: "Lead Magnet", conv: "27.9%", trend: [8, 12, 10, 14, 16, 18, 15], free: true, noConnect: true },
          ].map((p, i) => (
            <Card key={i} style={{ padding: "14px 16px", cursor: "pointer", transition: "border-color 0.15s" }}
              onMouseEnter={e => e.currentTarget.style.borderColor = c.blueBorder}
              onMouseLeave={e => e.currentTarget.style.borderColor = c.border}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 8 }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 3 }}>{p.name}</div>
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                    <Pill bg={c.blueLight} color={c.blue} border={c.blueBorder}>{p.type}</Pill>
                    <Pill bg={c.greenLight} color={c.green} border={c.greenBorder} dot>Live</Pill>
                    {p.hasUpsell && <Pill bg={c.greenLight} color={c.green} border={c.greenBorder}>Upsell ✓</Pill>}
                    {p.exp > 0 && <Pill bg={c.purpleLight} color={c.purple} border={c.purpleBorder}>Testing</Pill>}
                  </div>
                </div>
                <MiniSparkline data={p.trend} color={p.warn ? c.amber : c.green} />
              </div>
              <div style={{ display: "flex", gap: 20, alignItems: "end" }}>
                <div>
                  <div style={{ fontSize: 9, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em", color: c.muted }}>Revenue</div>
                  <div style={{ fontSize: 18, fontWeight: 700, color: p.free ? c.blue : c.text }}>{p.rev}</div>
                </div>
                {p.sales !== null && <div>
                  <div style={{ fontSize: 9, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em", color: c.muted }}>Sales</div>
                  <div style={{ fontSize: 18, fontWeight: 700 }}>{p.sales}</div>
                </div>}
                <div>
                  <div style={{ fontSize: 9, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em", color: c.muted }}>Conv</div>
                  <div style={{ fontSize: 18, fontWeight: 700, color: p.warn ? c.amber : c.text }}>{p.conv}{p.warn && " ⚠️"}</div>
                </div>
                <div style={{ marginLeft: "auto", display: "flex", gap: 4 }}>
                  {p.warn && <AiBtn small color={c.purple} bg={c.purpleLight} border={c.purpleBorder}>AI Redesign</AiBtn>}
                  {!p.hasUpsell && !p.free && <AiBtn small>Generate Upsell</AiBtn>}
                  {p.noConnect && <Btn small color={c.amber} bg={c.amberLight} border={c.amberBorder}>Connect Product</Btn>}
                </div>
              </div>
            </Card>
          ))}
        </div>

        {/* Single opportunity insight */}
        <Card style={{ padding: "14px 18px", borderLeft: `3px solid ${c.purple}` }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 13 }}>✦ <strong>3 of 4 paid products have no upsell.</strong> Creators with upsells earn 40% more on average.</span>
            <AiBtn small color={c.purple} bg={c.purpleLight} border={c.purpleBorder}>Generate Upsells</AiBtn>
          </div>
        </Card>
      </div>
    );
  };

  // ════════════════════════════════════════════
  //  PRODUCTS PAGE
  // ════════════════════════════════════════════
  const ProductsPage = () => {
    const AI = () => <span style={{ fontSize: 11, marginRight: 2 }}>✦</span>;
    const AiBtn = ({ children, color = c.blue, bg = c.blueLight, border = c.blueBorder, small, strong }) => (
      <button style={{
        background: strong ? `linear-gradient(135deg, ${color}, ${color}dd)` : bg,
        color: strong ? "#fff" : color,
        border: strong ? "none" : `1px solid ${border}`, borderRadius: strong ? 8 : 6,
        padding: strong ? "8px 16px" : small ? "3px 8px" : "4px 11px",
        fontSize: small ? 10 : strong ? 13 : 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap",
        display: "inline-flex", alignItems: "center", gap: 3,
      }}><AI />{children}</button>
    );

    const gridCols = "1fr 90px 60px 120px 70px 130px";
    const TableHeader = () => (
      <div style={{ display: "grid", gridTemplateColumns: gridCols, gap: 8, alignItems: "center", padding: "0 0 6px", borderBottom: `2px solid ${c.border}`, marginBottom: 2 }}>
        {["Product", "Type", "Price", "Connected", "Status", ""].map((h, i) => (
          <div key={i} style={{ fontSize: 9, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: c.muted }}>{h}</div>
        ))}
      </div>
    );
    const ProductRow = ({ p }) => (
      <div style={{ display: "grid", gridTemplateColumns: gridCols, gap: 8, alignItems: "center", padding: "9px 0", borderBottom: `1px solid ${c.border}`, cursor: "pointer" }}
        onMouseEnter={e => e.currentTarget.style.background = c.bg}
        onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
        <div style={{ fontSize: 12, fontWeight: 600, color: c.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</div>
        <div><Pill bg={c.blueLight} color={c.blue} border={c.blueBorder}>{p.type}</Pill></div>

const OPill = ({ bg, color, border, children }) => (
  <span style={{ display: "inline-flex", alignItems: "center", padding: "2px 9px", borderRadius: 100, fontSize: 10, fontWeight: 700, background: bg, color, border: `1px solid ${border}`, whiteSpace: "nowrap" }}>{children}</span>

const Onboarding = ({ onComplete }) => {
  const [step, setStep] = useState("welcome");
  const [idea, setIdea] = useState("I want to sell an online course about watercolor painting for beginners. I'd price it around $49 and include video lessons, practice templates, and a community.");
  const [genProgress, setGenProgress] = useState(0);
  const [activeGen, setActiveGen] = useState(0);
  const [readyReveal, setReadyReveal] = useState(false);

  const pc = "#7534ED";
  const sc = "#2563EB";
  const progressRef = useRef(0);
  const trackRef = useRef(null);
  const dotRefs = useRef([]);
  const carouselPos = useRef(0);

  // Progress simulation — updates DOM directly for reveals, React state throttled
  useEffect(() => {
    if (step !== "generating") return;
    const interval = setInterval(() => {
      progressRef.current += 0.5;
      const p = progressRef.current;
      if (p >= 100) {
        clearInterval(interval);
        setGenProgress(100);
        setActiveGen(oGenTasks.length - 1);
        setTimeout(() => setStep("ready"), 600);
        return;
      }
      // Direct DOM updates for reveal elements (no React re-render)
      document.querySelectorAll("[data-reveal]").forEach(el => {
        const threshold = parseFloat(el.getAttribute("data-reveal"));
        if (p > threshold) {
          el.style.opacity = "1";
          el.style.transform = "translateY(0)";
        }
      });
      // Throttled React state update every 2%
      if (Math.floor(p * 10) % 20 === 0) {
        setGenProgress(p);
        setActiveGen(Math.min(Math.floor((p / 100) * oGenTasks.length), oGenTasks.length - 1));
      }
    }, 80);
    return () => clearInterval(interval);
  }, [step]);

  // Carousel auto-rotate — pure DOM, no React
  useEffect(() => {
    if (step !== "generating") return;
    const interval = setInterval(() => {
      carouselPos.current += 1;
      const pos = carouselPos.current;
      const track = trackRef.current;
      if (!track) return;
      // Slide to next position
      track.style.transform = `translateX(${-pos * 440}px)`;
      // Update dots
      const dotIdx = pos % 2;
      if (dotRefs.current[0]) { dotRefs.current[0].style.width = dotIdx === 0 ? "24px" : "8px"; dotRefs.current[0].style.background = dotIdx === 0 ? oc.purple : oc.border; }
      if (dotRefs.current[1]) { dotRefs.current[1].style.width = dotIdx === 1 ? "24px" : "8px"; dotRefs.current[1].style.background = dotIdx === 1 ? oc.purple : oc.border; }
      // If we just slid to the clone (pos 2), wait for transition to finish then jump back
      if (pos === 2) {
        setTimeout(() => {
          track.style.transition = "none";
          track.style.transform = "translateX(0)";
          track.offsetHeight; // force reflow
          track.style.transition = "transform 0.7s cubic-bezier(0.4, 0, 0.2, 1)";
          carouselPos.current = 0;
        }, 750); // slightly longer than the 700ms transition
      }
    }, 4000);
    return () => clearInterval(interval);
  }, [step]);

  useEffect(() => {
    if (step === "ready") setTimeout(() => setReadyReveal(true), 300);
  }, [step]);

  const startGeneration = () => { progressRef.current = 0; carouselPos.current = 0; setGenProgress(0); setActiveGen(0); setStep("generating"); };

  return (
    <div>
      {/* ═══════ WELCOME ═══════ */}
      <div style={{ display: step === "welcome" ? "flex" : "none", minHeight: "100vh", background: oc.bg, alignItems: "center", justifyContent: "center" }}>

          <div ref={el => dotRefs.current[0] = el} style={{ height: 6, borderRadius: 3, width: 24, background: oc.purple, transition: "all 0.3s", cursor: "pointer" }} />
          <div ref={el => dotRefs.current[1] = el} style={{ height: 6, borderRadius: 3, width: 8, background: oc.border, transition: "all 0.3s", cursor: "pointer" }} />
        </div>

        <div style={{ width: 460, textAlign: "center" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 6 }}>
            <span style={{ fontSize: 18 }}>{(oGenTasks[activeGen] || oGenTasks[0]).icon}</span>
            <span style={{ fontSize: 15, fontWeight: 700 }}>{(oGenTasks[activeGen] || oGenTasks[0]).label}</span>
          </div>
          <div style={{ fontSize: 12, color: oc.sub, marginBottom: 14 }}>{(oGenTasks[activeGen] || oGenTasks[0]).detail}</div>
          <div style={{ height: 8, background: oc.border, borderRadius: 4, overflow: "hidden", marginBottom: 8 }}>
            <div style={{ height: "100%", borderRadius: 4, background: `linear-gradient(90deg, ${oc.purple}, ${oc.blue})`, width: `${genProgress}%`, transition: "width 0.3s" }} />
          </div>
          <div style={{ fontSize: 12, color: oc.muted, marginBottom: 16 }}>{Math.round(genProgress)}% complete</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 5, justifyContent: "center" }}>
            {oGenTasks.map((t, i) => (
              <span key={i} style={{ fontSize: 10, fontWeight: 600, padding: "3px 10px", borderRadius: 100, background: i < activeGen ? oc.greenLight : i === activeGen ? oc.purpleLight : oc.bg, color: i < activeGen ? oc.green : i === activeGen ? oc.purple : oc.muted, border: `1px solid ${i < activeGen ? oc.greenBorder : i === activeGen ? oc.purpleBorder : oc.border}`, transition: "all 0.3s" }}>
                {i < activeGen ? "✓ " : ""}{t.label}
              </span>
            ))}
          </div>
        </div>
      </div>

      {/* ═══════ READY ═══════ */}
      <div style={{ display: step === "ready" ? "block" : "none", minHeight: "100vh", background: oc.bg }}>
        <div style={{ background: `linear-gradient(135deg, ${oc.purple}10, ${oc.blue}10)`, borderBottom: `1px solid ${oc.border}`, padding: "32px 40px", textAlign: "center" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 12 }}>
            <div style={{ width: 28, height: 28, borderRadius: 7, background: `linear-gradient(135deg, ${oc.purple}, ${oc.blue})`, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 14 }}>✦</div>
            <span style={{ fontSize: 16, fontWeight: 800 }}>SamCart</span>
          </div>
          <h1 style={{ fontSize: 32, fontWeight: 800, letterSpacing: "-0.02em", marginBottom: 6 }}>Your new business is ready!</h1>
          <p style={{ fontSize: 14, color: oc.sub }}>We generated everything you need. Review and customize below.</p>
        </div>
        <div style={{ maxWidth: 900, margin: "0 auto", padding: "28px 32px" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, opacity: readyReveal ? 1 : 0, transform: readyReveal ? "translateY(0)" : "translateY(20px)", transition: "all 0.5s" }}>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: oc.muted, marginBottom: 8 }}>Landing Pages</div>
              {[{n:"Landing Page",u:"yoursite.samcart.com",i:"🖥️"},{n:"Link in Bio",u:"yoursite.samcart.com/bio",i:"🔗"}].map((pg,idx) => (
                <div key={idx} style={{ background: oc.card, borderRadius: 12, border: `1px solid ${oc.border}`, padding: "16px 18px", marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 24 }}>{pg.i}</span>
                    <div style={{ flex: 1 }}><div style={{ fontSize: 14, fontWeight: 700, marginBottom: 2 }}>{pg.n}</div><div style={{ fontSize: 11, color: oc.muted }}>{pg.u}</div></div>
                    <OPill bg={oc.greenLight} color={oc.green} border={oc.greenBorder}>Live</OPill>
                  </div>
                </div>
              ))}
              <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                <button style={{ padding: "7px 14px", borderRadius: 8, border: `1px dashed ${oc.purpleBorder}`, background: "transparent", color: oc.purple, fontSize: 12, fontWeight: 600 }}>✦ + New Page</button>
                <button style={{ padding: "7px 14px", borderRadius: 8, border: `1px solid ${oc.border}`, background: oc.card, color: oc.sub, fontSize: 12, fontWeight: 600 }}>A/B Test Pages</button>
              </div>
            </div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: oc.muted, marginBottom: 8 }}>Products</div>
              {[{n:"Entry Package",p:"$29",t:"Starter"},{n:"Complete Box",p:"$79",t:"Premium"}].map((pr,idx) => (
                <div key={idx} style={{ background: oc.card, borderRadius: 12, border: `1px solid ${oc.border}`, padding: "16px 18px", marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <div style={{ width: 36, height: 36, borderRadius: 8, background: `linear-gradient(135deg, ${oc.purple}20, ${oc.blue}20)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 800, color: oc.purple }}>$</div>
                    <div style={{ flex: 1 }}><div style={{ fontSize: 14, fontWeight: 700, marginBottom: 2 }}>{pr.n}</div><div style={{ display: "flex", gap: 4, alignItems: "center" }}><OPill bg={oc.blueLight} color={oc.blue} border={oc.blueBorder}>{pr.t}</OPill><span style={{ fontSize: 13, fontWeight: 700 }}>{pr.p}</span></div></div>
                    <button style={{ padding: "4px 10px", borderRadius: 6, background: oc.purpleLight, color: oc.purple, border: `1px solid ${oc.purpleBorder}`, fontSize: 10, fontWeight: 600 }}>✦ A/B Test</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ background: oc.card, borderRadius: 12, border: `1px solid ${oc.border}`, padding: "20px 24px", marginTop: 20, opacity: readyReveal ? 1 : 0, transition: "opacity 0.5s 0.2s" }}>
            <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 12 }}>✦ Everything we generated</div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              {[{l:"2 Products",i:"📦"},{l:"2 Landing Pages",i:"🖥️"},{l:"1 Checkout Flow",i:"💳"},{l:"5-Part Email Sequence",i:"📧"},{l:"9 Social Posts",i:"📱"},{l:"Brand Kit",i:"🎨"}].map((item,i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 14px", background: oc.bg, borderRadius: 8, border: `1px solid ${oc.border}` }}>
                  <span style={{ fontSize: 16 }}>{item.i}</span><span style={{ fontSize: 12, fontWeight: 600 }}>{item.l}</span><span style={{ fontSize: 10, color: oc.green }}>✓</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{ textAlign: "center", marginTop: 28, opacity: readyReveal ? 1 : 0, transition: "opacity 0.5s 0.4s" }}>
            <button onClick={onComplete} style={{ padding: "14px 40px", borderRadius: 10, border: "none", background: `linear-gradient(135deg, ${oc.purple}, ${oc.blue})`, color: "#fff", fontSize: 15, fontWeight: 700, boxShadow: `0 4px 16px ${oc.purple}40` }}>✦ Go to Dashboard</button>
            <p style={{ fontSize: 12, color: oc.muted, marginTop: 8 }}>You can edit everything from your dashboard</p>
          </div>
        </div>
      </div>

    </div>
  );
};

// ════════════════════════════════════════════
// ROOT — switches between onboarding and dashboard
// ════════════════════════════════════════════
const Root = () => {
  const [mode, setMode] = useState("onboarding");
  const [onboardingKey, setOnboardingKey] = useState(0);
  const startNewBusiness = () => {
    setOnboardingKey(prev => prev + 1);
    setMode("onboarding");
  };
  return (
    <div>
      <div style={{ display: mode === "onboarding" ? "block" : "none" }}>
        <Onboarding key={onboardingKey} onComplete={() => setMode("dashboard")} />
      </div>
      <div style={{ display: mode === "dashboard" ? "block" : "none" }}>
        <Dashboard onNewBusiness={startNewBusiness} />
      </div>
    </div>
  );
};

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
